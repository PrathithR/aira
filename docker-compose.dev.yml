# ============================================================
# AIRA - Docker Compose (DEVELOPMENT)
# Usage: docker compose -f docker-compose.dev.yml up --build
# ============================================================

services:
  aira:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Live code reload — mount source into container
      - ./src:/aira/src
      - ./data:/aira/data
      - ./scripts:/aira/scripts
      - ./tests:/aira/tests
    env_file:
      - .env
    environment:
      - PYTHONPATH=/aira
      - DEBUG=true
    # Override production CMD with --reload for hot reloading
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
