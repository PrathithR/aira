# ============================================================
# AIRA - Docker Compose (DEVELOPMENT)
# Usage: docker compose -f docker-compose.dev.yml up --build
# ============================================================

services:
  aira:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aira-dev
    ports:
      - "8000:8000"
    volumes:
      # Live code reload — mount source into container
      - ./app:/app/app
      - ./data:/app/data
      - ./scripts:/app/scripts
      - ./tests:/app/tests
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - DEBUG=true
    # Override production CMD with --reload for hot reloading
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
